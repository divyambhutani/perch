name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint + swift-format
        run: |
          brew install swiftlint
          brew install swift-format
      - name: SwiftLint
        run: swiftlint --strict
      - name: swift-format lint
        run: |
          # Fail on any formatter diagnostic in tracked Swift sources.
          find Perch Tests -name "*.swift" -print0 \
            | xargs -0 swift-format lint --configuration .swift-format --strict

  build-and-test:
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode_15.4.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Swift version
        run: swift --version

      - name: SwiftPM build + test (with coverage)
        run: swift test --parallel --enable-code-coverage

      - name: Export coverage
        run: |
          set -euo pipefail
          BIN_PATH=$(swift build --show-bin-path)
          PROF=$(find "$BIN_PATH/codecov" -name "default.profdata" | head -n1)
          if [[ -n "$PROF" ]]; then
            xcrun llvm-cov export \
              -format=lcov \
              -instr-profile "$PROF" \
              "$BIN_PATH/PerchPackageTests.xctest/Contents/MacOS/PerchPackageTests" \
              > coverage.lcov || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage.lcov

      - name: Install xcodegen + xcbeautify
        run: |
          brew install xcodegen
          brew install xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Xcode build + test
        run: |
          set -o pipefail
          xcodebuild \
            -project Perch.xcodeproj \
            -scheme Perch \
            -configuration Debug \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -skipPackagePluginValidation \
            test | xcbeautify --renderer github-actions
