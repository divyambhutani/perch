name: Perch
options:
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.perch.app
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      baseConfig: Support/Config/Debug.xcconfig
    Release:
      baseConfig: Support/Config/Release.xcconfig
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.7.1
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: 2.4.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing.git
    from: 1.17.0
targets:
  Perch:
    type: application
    platform: macOS
    sources:
      - Sources/PerchApp
      - Sources/Perch
      - path: Support
        excludes:
          - scripts/**
          - Config/**
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Sparkle
        product: Sparkle
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_LSUIElement: YES
        CODE_SIGN_ENTITLEMENTS: Support/Entitlements/Perch.entitlements
        PRODUCT_NAME: Perch
  PerchCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PerchCoreTests
    dependencies:
      - target: Perch
      - package: SnapshotTesting
        product: SnapshotTesting
  PerchFeaturesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PerchFeaturesTests
    dependencies:
      - target: Perch
